<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케터 부캐 테스트</title>
    <style>
        /* CSS 스타일링 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f4f6f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        #app { width: 100%; max-width: 480px; min-height: 100vh; background-color: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        
        .screen { display: none; flex-direction: column; flex: 1; padding: 40px 20px; text-align: center; justify-content: center; animation: fadeIn 0.5s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 시작 화면 — 영역 전체를 커버 이미지로 (test_cover.png) */
        #start-screen {
            justify-content: flex-end;
            align-items: stretch;
            background-color: #e8ecf0;
            background-image: url('test_cover.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .btn-main { background-color: #111; color: #fff; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-main:hover { background-color: #333; transform: scale(0.98); }
        .btn-share {
            width: 100%;
            margin-top: 12px;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            background: #fff;
            color: #333;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-share:hover { border-color: #111; background: #f8f9fa; }
        .btn-share-icon { flex-shrink: 0; }
        .copy-toast {
            position: fixed;
            left: 50%;
            bottom: 32px;
            transform: translateX(-50%) translateY(16px);
            background: rgba(17, 17, 17, 0.94);
            color: #fff;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
            max-width: calc(100vw - 40px);
            text-align: center;
        }
        .copy-toast.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 질문 화면 */
        .progress-container { width: 100%; background-color: #eee; height: 6px; border-radius: 3px; margin-bottom: 40px; }
        .progress-bar { height: 100%; background-color: #111; border-radius: 3px; width: 0%; transition: width 0.3s; }
        .question-number { font-size: 16px; font-weight: bold; color: #888; margin-bottom: 10px; }
        .question-text { font-size: 22px; font-weight: bold; line-height: 1.5; word-break: keep-all; margin-bottom: 40px; min-height: 80px; }
        .answer-btn { background-color: #f8f9fa; border: 2px solid #e9ecef; padding: 20px; border-radius: 15px; font-size: 16px; cursor: pointer; margin-bottom: 15px; transition: 0.2s; word-break: keep-all; line-height: 1.4; }
        .answer-btn:hover { border-color: #111; background-color: #fff; }

        /* 로딩 화면 */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #111; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 18px; font-weight: bold; color: #333; height: 50px; }

        /* 결과 화면 */
        .result-type { font-size: 20px; font-weight: bold; color: #0056b3; margin-bottom: 10px; }
        .result-title { font-size: 32px; font-weight: 900; margin-bottom: 12px; word-break: keep-all; }
        .result-illustration-wrap {
            width: 100%;
            margin: 0 auto 18px;
            text-align: center;
        }
        .result-illustration-wrap.is-hidden { display: none; }
        .result-illustration {
            display: block;
            max-width: 100%;
            width: auto;
            max-height: 220px;
            height: auto;
            margin: 0 auto;
            object-fit: contain;
        }
        .result-desc { font-size: 16px; line-height: 1.6; color: #444; margin-bottom: 30px; text-align: center; background: #f8f9fa; padding: 20px; border-radius: 15px; white-space: pre-line; word-break: keep-all; }
        .result-section { text-align: left; margin-bottom: 25px; }
        .result-section--marketing-strong {
            margin-bottom: 0;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .result-section--burnout {
            padding-top: 20px;
            margin-top: 0;
        }
        .result-section h3 { font-size: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .result-section p { font-size: 15px; line-height: 1.6; color: #555; white-space: pre-line; word-break: keep-all; }
        #res-weak { white-space: normal; }
        #res-weak .weak-tag {
            display: block;
            width: fit-content;
            max-width: 100%;
            margin-top: 5px;
            margin-bottom: 3px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.25;
        }
        #res-weak .weak-tag:first-of-type { margin-top: 4px; }
        #res-weak .weak-risk {
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%);
            color: #c92a2a;
            border: 1px solid #ffc9c9;
            box-shadow: 0 1px 2px rgba(201, 42, 42, 0.08);
        }
        #res-weak .weak-cure {
            background: linear-gradient(135deg, #e7f5ff 0%, #d0ebff 100%);
            color: #1864ab;
            border: 1px solid #a5d8ff;
            box-shadow: 0 1px 2px rgba(24, 100, 171, 0.08);
        }
        #res-strong { white-space: normal; font-size: 15px; line-height: 1.6; color: #555; word-break: keep-all; }
        #res-strong .strong-item { margin-bottom: 18px; }
        #res-strong .strong-item:last-child { margin-bottom: 0; }
        #res-strong .strong-tag {
            display: inline-block;
            margin-bottom: 8px;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.3;
            background: linear-gradient(135deg, #ebfbee 0%, #d3f9d8 100%);
            color: #2b8a3e;
            border: 1px solid #b2f2bb;
            box-shadow: 0 1px 2px rgba(43, 138, 62, 0.08);
        }
        #res-strong .strong-desc {
            margin: 0;
            padding: 0 2px;
            font-size: 15px;
            line-height: 1.6;
            color: #555;
            font-weight: 400;
        }
        #res-strong .strong-desc-only { margin: 0; }
        .partner-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            align-items: stretch;
        }
        .partner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            min-height: 0;
            background: #f1f3f5;
            padding: 12px 12px 14px;
            border-radius: 12px;
            text-align: center;
            word-break: keep-all;
        }
        .partner-good {
            border-top: 3px solid #74c0fc;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .partner-bad {
            border-top: 3px solid #ffa8a8;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }
        .partner-heading {
            font-size: 16px;
            font-weight: 800;
            margin: 0 0 8px 0;
            padding: 0;
            line-height: 1.25;
            letter-spacing: -0.03em;
        }
        .partner-good .partner-heading { color: #1864ab; }
        .partner-bad .partner-heading { color: #c92a2a; }
        .partner-body { width: 100%; }
        .partner-type {
            display: block;
            font-size: 16px;
            font-weight: 800;
            color: #212529;
            margin: 0 0 0 0;
            line-height: 1.35;
            letter-spacing: -0.02em;
        }
        .partner-good .partner-type { color: #0b7285; }
        .partner-bad .partner-type { color: #9c1f1f; }
        .partner-mini-img-wrap {
            margin: 0 auto 10px;
            text-align: center;
        }
        .partner-mini-img-wrap:empty { display: none; }
        .partner-mini-img-wrap.is-hidden { display: none; }
        .partner-mini-img {
            display: block;
            max-height: 64px;
            max-width: 100%;
            width: auto;
            margin: 0 auto;
            object-fit: contain;
        }
        .partner-desc {
            margin: 10px 0 0 0;
            padding: 10px 2px 0 2px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 13px;
            font-weight: 400;
            line-height: 1.55;
            color: #495057;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <button type="button" class="btn-main" onclick="startTest()">내 안의 마케터 깨우기</button>
    </div>

    <div id="question-screen" class="screen">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="q-num" class="question-number">Q1/12</div>
        <div id="q-text" class="question-text">질문 텍스트</div>
        <button id="btn-a" class="answer-btn" onclick="selectAnswer('A')">A 답변</button>
        <button id="btn-b" class="answer-btn" onclick="selectAnswer('B')">B 답변</button>
    </div>

    <div id="loading-screen" class="screen">
        <div class="loader"></div>
        <div id="loading-text" class="loading-text">분석 중...</div>
    </div>

    <div id="result-screen" class="screen">
        <div id="res-type" class="result-type">유형명</div>
        <div id="res-title" class="result-title">타이틀</div>
        <div id="res-illustration-wrap" class="result-illustration-wrap">
            <img id="res-illustration" class="result-illustration" src="" alt="" decoding="async" />
        </div>
        <div id="res-desc" class="result-desc">설명</div>
        
        <div class="result-section result-section--marketing-strong">
            <h3>✨ 당신의 마케팅 필살기</h3>
            <div id="res-strong" class="result-strong"></div>
        </div>
        <div class="result-section result-section--burnout">
            <h3>💔 번아웃 위험신호 & 처방전</h3>
            <p id="res-weak" class="result-weak"></p>
        </div>
        <div class="partner-box">
            <div class="partner partner-good">
                <div class="partner-heading">🤝 환상의 파트너</div>
                <div id="res-good-partner-img" class="partner-mini-img-wrap" data-partner-img-wrap></div>
                <div id="res-good-partner" class="partner-body"></div>
            </div>
            <div class="partner partner-bad">
                <div class="partner-heading">💣 환장의 파트너</div>
                <div id="res-bad-partner-img" class="partner-mini-img-wrap" data-partner-img-wrap></div>
                <div id="res-bad-partner" class="partner-body"></div>
            </div>
        </div>
        <button type="button" class="btn-main" onclick="location.reload()">테스트 다시하기</button>
        <button type="button" class="btn-share" onclick="copyShareLink()" aria-label="테스트 링크 복사">
            <svg class="btn-share-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2"/>
                <path d="M8.59 13.51l6.83 3.98M15.41 6.49l-6.82 3.98" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            테스트 공유하기
        </button>
    </div>
</div>
<div id="copy-toast" class="copy-toast" role="status" aria-live="polite">링크가 복사되었습니다</div>

<script>
    const questions = [
        { q: "주간 아이디어 회의 시간, 나는?", a: "내 생각을 입 밖으로 꺼내며 아이디어를 구체화한다. 동료들의 반응을 볼 때 비로소 에너지가 돌고 아이디어가 발전한다.", b: "회의 전 내 생각을 메모장에 완벽히 정리해야 마음이 편하다. 정리가 덜 된 상태에서 말을 꺼내는 건 에너지가 소모되는 일이다.", type: "EI", valA: "E", valB: "I" },
        { q: "협업 부서(디자인, 개발, 영업 등)와 소통해야 하는 상황에서 나는?", a: '"일단 잠깐 가서 이야기할까요?" 혹은 "전화 가능하세요?" 직접 대화로 풀 때 오해가 없고 속이 시원하다.', b: '"텍스트로 정리해서 드릴게요." 메신저나 메일로 히스토리를 남기며 정제된 문장으로 소통하는 것이 훨씬 명확하고 편안하다.', type: "EI", valA: "E", valB: "I" },
        { q: "캠페인 온에어 직전, 극도의 몰입이 필요한 오후", a: '팀원들과 화이트보드 앞에 모여 "이거 어때요?"라고 계속 묻고 답하며 집단지성을 발휘할 때 집중력이 올라간다.', b: "조용히 헤드셋을 쓰고 메신저 알람을 끈 채, 나만의 세계로 깊이 파고들어 작업할 때 최상의 결과물이 나온다.", type: "EI", valA: "E", valB: "I" },
        { q: "새로운 캠페인 레퍼런스를 수집할 때 나의 방식은?", a: "우리 업종에서 이미 성공한 사례, 구체적인 수치(CTR, ROAS)가 검증된 '확실한 데이터' 위주로 찾아본다.", b: "마케팅과 전혀 상관없는 예술 전시, 영화, 혹은 해외의 생소한 브랜드 사례에서 '새로운 연결고리'를 찾으려 한다.", type: "SN", valA: "S", valB: "N" },
        { q: "광고 카피나 콘텐츠의 방향성을 결정할 때", a: "제품의 기능, 가격 혜택, 이벤트 기간 등 소비자가 당장 얻을 수 있는 '실질적인 정보'를 강조하는 게 우선이다.", b: "이 제품이 소비자에게 어떤 의미인지, 어떤 미래의 라이프스타일을 제안하는지 '브랜드 메시지'를 심어주는 게 우선이다.", type: "SN", valA: "S", valB: "N" },
        { q: "업무 관련 교육이나 아티클을 볼 때 내가 끌리는 제목은?", a: "즉시 적용 가능한 효율 200% 상승 마케팅 실무 테크닉 10가지", b: "2030년, 마케팅의 정의는 어떻게 변화할 것인가? 패러다임의 전환", type: "SN", valA: "S", valB: "N" },
        { q: "공들여 준비한 캠페인의 성과가 예상보다 저조할 때", a: '"어디서 구멍이 났지?" 즉시 대시보드를 열어 이탈률, 클릭률 등 수치를 뜯어보며 실패의 논리적 원인을 찾아낸다.', b: '"팀원들 사기가 떨어지면 어쩌지?" 고생한 동료들의 마음을 먼저 살피고, 서로 격려하며 다음을 기약할 수 있는 분위기를 만든다.', type: "TF", valA: "T", valB: "F" },
        { q: "동료가 가져온 기획안에 치명적인 약점이 보일 때", a: '"이 부분은 전환이 안 일어날 것 같아요." 브랜드의 성과를 위해 보완해야 할 점을 가감 없이, 정확하게 피드백해 준다.', b: '"아이디어 좋네요! 그런데 이런 방향도 같이 고민해 보면 어떨까요?" 긍정적인 부분을 먼저 언급하며 개선점을 부드럽게 제안한다.', type: "TF", valA: "T", valB: "F" },
        { q: "마케팅 의사결정의 마지막 순간, 나를 움직이는 것은?", a: '"이게 가장 효율적이니까." 비용 대비 효율(ROI)과 데이터가 증명하는 객관적인 기대 수익을 근거로 결정한다.', b: '"우리 브랜드답고, 고객이 좋아할 테니까." 브랜드가 추구하는 가치와 소비자에게 줄 정서적 만족감을 최우선으로 고려해 결정한다.', type: "TF", valA: "T", valB: "F" },
        { q: "새로운 프로젝트가 시작될 때 나의 업무 루틴은?", a: "단계별 데드라인과 체크리스트가 포함된 상세 업무 플랜을 먼저 세워야 마음이 놓인다.", b: "큰 방향성만 정해두고, 구체적인 실행 방안은 진행 상황이나 실시간 반응에 맞춰 유연하게 채워나간다.", type: "JP", valA: "J", valB: "P" },
        { q: "캠페인 온에어 직전, 갑작스러운 수정 요청이 들어온다면?", a: '"이미 다 세팅 끝났는데!" 미리 짜둔 타임라인이 꼬이는 것에 극심한 스트레스를 받으며, 이를 복구하려 애쓴다.', b: '"마케팅이 다 그런 거지." 돌발 상황도 업무의 일부라고 생각하며, 즉흥적으로 대안을 찾아 빠르게 대응한다.', type: "JP", valA: "J", valB: "P" },
        { q: "나의 업무용 책상이나 폴더 정리 상태는?", a: "'240415_최종_진짜최종_확정'. 누구나 찾기 쉽게 이름과 위치가 완벽하게 정리되어 있어야 효율이 난다.", b: "'프로젝트_샘플_1', 'ㄴㅁㅇㄹ'. 나만 알아볼 수 있는 규칙(혹은 무질서)이 있지만, 필요한 건 신기하게 다 찾아낸다.", type: "JP", valA: "J", valB: "P" }
    ];

    // 16가지 전체 유형 데이터 추가
    const results = {
    "ESTP": {
        type: "MARKETER",
        title: "🏄 실시간 반응 헌터",

    const SHARE_TEST_URL = 'https://jiwoo-world.github.io/marketer-test/';

    function showCopyToast() {
        const el = document.getElementById('copy-toast');
        if (!el) return;
        el.classList.add('visible');
        clearTimeout(window.__copyToastTimer);
        window.__copyToastTimer = setTimeout(function () {
            el.classList.remove('visible');
        }, 2500);
    }

    function copyShareLink() {
        const url = SHARE_TEST_URL;
        function fallback() {
            var ta = document.createElement('textarea');
            ta.value = url;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showCopyToast();
            } catch (err) {
                window.prompt('아래 링크를 복사해 주세요:', url);
            }
            document.body.removeChild(ta);
        }
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            navigator.clipboard.writeText(url).then(showCopyToast).catch(fallback);
        } else {
            fallback();
        }
    }

    function escapeHtml(t) {
        return String(t)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

        const map = {};
        Object.keys(results).forEach(function (code) {
            const title = results[code].title.trim();
            const parts = title.split(/\s+/);
            const label = parts.length >= 2 ? parts.slice(1).join(' ') : title;
            map[label] = code;
        });
        partnerLabelToMbtiCache = map;
        return map;

            tagIndex += 1;
            blocks.push(
                '<div class="strong-item"><span class="strong-tag">' +
                    emoji +
                    ' ' +
                    escapeHtml(label) +
                    '</span><p class="strong-desc">' +
                    escapeHtml(body) +
                    '</p></div>'
            );
        }
        return blocks.join('');
    }

    function formatWeakHtml(raw) {
        let s = escapeHtml(raw);
        s = s.replace(/\n/g, '<br>');
        s = s.replace(/\[위험 신호\]/g, '<span class="weak-tag weak-risk">⚠️ 위험 신호</span>');
        s = s.replace(/\[처방전\]/g, '<span class="weak-tag weak-cure">💊 처방전</span>');
        s = s.replace(/<\/span><br>/g, '</span>');
        return s;
    }

    function calculateResult() {
        const mbti = 
            (scores.E > scores.I ? "E" : "I") +
            (scores.S > scores.N ? "S" : "N") +
            (scores.T > scores.F ? "T" : "F") +
            (scores.J > scores.P ? "J" : "P");

        const resultData = results[mbti];

        if(!resultData) {
            alert("해당 MBTI 유형의 결과 데이터를 찾을 수 없습니다: " + mbti);
            return;
        }

        document.getElementById('res-type').innerText = `[ ${resultData.type} ]`;
        document.getElementById('res-title').innerText = resultData.title;

        const illWrap = document.getElementById('res-illustration-wrap');
        const ill = document.getElementById('res-illustration');
        illWrap.classList.remove('is-hidden');
        ill.alt = mbti + ' 마케터 유형 일러스트';
        ill.src = mbti + '.png';
        ill.onerror = function () {
            illWrap.classList.add('is-hidden');
        };
        ill.onload = function () {
            illWrap.classList.remove('is-hidden');
        };

        document.getElementById('res-desc').innerText = resultData.desc;
        document.getElementById('res-strong').innerHTML = formatStrongHtml(resultData.strong);
        document.getElementById('res-weak').innerHTML = formatWeakHtml(resultData.weak);
        var goodFirst = getPartnerFirstLine(resultData.good);
        var badFirst = getPartnerFirstLine(resultData.bad);
        setPartnerMiniIllustration(document.getElementById('res-good-partner-img'), partnerLabelToMbti(goodFirst));
        setPartnerMiniIllustration(document.getElementById('res-bad-partner-img'), partnerLabelToMbti(badFirst));
        document.getElementById('res-good-partner').innerHTML = formatPartnerHtml(resultData.good);
        document.getElementById('res-bad-partner').innerHTML = formatPartnerHtml(resultData.bad);

        showScreen('result-screen');
    }
</script>
